services:
  - type: web
    name: backend
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: financial-pulse-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: NEWS_API_KEY
        sync: false  # La pondremos manualmente
      - key: FLASK_ENV
        value: production

  - type: web
    name: frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist/financial-dashboard
    envVars:
      - key: API_URL
        fromService:
          name: backend
          type: web
          property: host  # Se rellena automáticamente

  - type: postgresql
    name: financial-pulse-db
    plan: free  # 1 GB gratis